<form class="form" [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <div class="section">
        <div class="campo">
            <label>Nombre:</label>
            <input type="text" formControlName="nombre">
        </div>

        <div class="campo">
            <label>Categoría:</label>
            <input type="text" formControlName="categoria">
        </div>
    </div>

    <div class="section">
        <div class="campo">
            <label>Marca:</label>
            <input type="text" formControlName="marca">
        </div>

        <div class="campo">
            <label>Precio:</label>
            <input type="number" formControlName="precio">
        </div>
    </div>

    <div class="section">
        <div class="campo">

            <label>Stock:</label>
            <input type="number" formControlName="stock">
        </div>


        <div class="campo">
            <label>Imagen:</label>
            <input type="text" formControlName="imagen">
        </div>
    </div>

    <div class="checkbox-group">
        <label>Disponibilidad:</label>
        <input type="checkbox" formControlName="disponibilidad">
    </div>

    <div class="campo">
        <label>Descripción:</label>
        <textarea formControlName="descripcionCorta" rows="10"></textarea>
    </div>

    <button type="submit" [disabled]="productForm.invalid">Guardar</button>
</form>
